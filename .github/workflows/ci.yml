# ─────────────────────────────────────────────────────────────────────────────
# CI — "check every change"
# Runs on every pull request into main. Builds + tests. Deploys NOTHING.
# If a step fails, the PR gets a red X (and branch protection blocks merge).
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]
  # 'workflow_dispatch' adds a "Run workflow" button in the Actions tab,
  # so you can trigger it by hand while learning.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No 'npm ci' here because our learning app has no dependencies.
      # In a real project you'd install dependencies at this point.

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
